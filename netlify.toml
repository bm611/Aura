[build]
  command = "npm install && npm run build --workspace=apps/web"
  publish = "apps/web/dist"
  functions = "apps/web/netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
